<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Communication Platform</title>
    <link rel="stylesheet" , href="./css/style.css" />
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'gluon-purple': '#6366f1',
              'gluon-dark': '#1e1b4b',
              'gluon-darker': '#0f0f23',
              'gluon-light': '#a5b4fc',
              'gluon-grey': '#6b7280'
            }
          }
        }
      }
    </script>
  </head>
  <body class="text-gray-200 min-h-screen font-sans" style="background-image: url('https://img.freepik.com/premium-photo/armchair-green-living-room-plants_43614-670.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
    <!-- Background overlay for better readability -->
    <div class="fixed inset-0 bg-black/10 z-0"></div>
    <div class="container mx-auto px-6 py-8 max-w-6xl relative z-10">
      

             <!-- ID and Connection Section -->
       <div class="bg-white/20 backdrop-blur-md rounded-2xl p-2 mb-8 border border-white/30 shadow-xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-end">
          <!-- Peer ID -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Room ID</label>
            <input 
              type="text" 
              placeholder="Enter peer's socket ID" 
              class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gluon-purple focus:border-transparent"
              id="peerIdInput"
            >
          </div>

          <!-- Connection Button -->
          <div>
            <button 
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 transform hover:scale-105 shadow-lg"
              id="connectionBtn">
              Connect
            </button>
          </div>
        </div>
      </div>

      <!-- Video Display Areas -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                 <!-- Remote Video -->
         <div class="lg:col-span-2">
           <div class="bg-white/20 backdrop-blur-md rounded-2xl p-6 border border-white/30 h-auto relative shadow-xl">
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-lg font-semibold text-gray-200">Remote Video</h3>
              <div class="flex items-center gap-2 text-red-400">
                <i class="fas fa-video-slash"></i>
                <span class="text-sm">Not Connected</span>
              </div>
            </div>
                         <div class="bg-white/20 backdrop-blur-md rounded-xl h-80 flex items-center justify-center border-2 border-dashed border-white/30 relative overflow-hidden p-4">
               <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover rounded-lg hidden"></video>
               <div class="flex items-center justify-center bg-white/20 backdrop-blur-md p-4" id="remoteVideoPlaceholder">
                 <div class="text-center text-gray-300">
                   <i class="fas fa-user-friends text-6xl mb-4 text-white"></i>
                   <p class="text-lg font-medium text-white mb-2">Waiting for peer to connect...</p>
                   <p class="text-sm text-gray-400">Share your ID with someone to start a call</p>
                 </div>
               </div>
             </div>
          </div>
          
        </div>

                 <!-- Your Video -->
         <div class="lg:col-span-1">
           <div class="bg-white/20 backdrop-blur-md rounded-2xl p-6 border border-white/30 h-auto shadow-xl">
            <h3 class="text-lg font-semibold text-gray-200 mb-4">You</h3>
                         <div class="bg-white/20 backdrop-blur-md rounded-xl h-80 flex items-center justify-center border-2 border-dashed border-white/30 relative overflow-hidden p-4">
               <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover rounded-lg hidden"></video>
               <div class="flex items-center justify-center bg-white/20 backdrop-blur-md p-4" id="localVideoPlaceholder">
                 <div class="text-center text-gray-300">
                   <i class="fas fa-user text-6xl mb-4 text-white"></i>
                   <p class="text-lg font-medium text-white mb-2">Your camera</p>
                   <p class="text-sm text-gray-400">Click to enable camera</p>
                 </div>
               </div>
             </div>
          </div>
          
        </div>
      </div>

      <!-- Call Controls -->
      <div class="flex justify-center mt-8">
        <div class="flex gap-6">
                     <!-- Microphone Button -->
           <button 
             class="w-16 h-16 bg-white/20 backdrop-blur-md hover:bg-white/30 text-white rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-110 shadow-xl border border-white/30"
             id="micBtn"
             onclick="toggleMicrophone()"
           >
             <i class="fas fa-microphone text-xl"></i>
           </button>

           <!-- Video Button -->
           <button 
             class="w-16 h-16 bg-white/20 backdrop-blur-md hover:bg-white/30 text-white rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-110 shadow-xl border border-white/30"
             id="videoBtn"
             onclick="toggleVideo()"
           >
             <i class="fas fa-video text-xl"></i>
           </button>

           <!-- Hangup Button -->
           <button 
             class="w-16 h-16 bg-red-500/20 backdrop-blur-md hover:bg-red-500/30 text-white rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-110 shadow-xl border border-red-400/30"
             onclick="hangup()"
           >
             <i class="fas fa-phone-slash text-xl"></i>
           </button>
            <div class=" text-center">
         <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md rounded-full px-6 py-3 border border-white/30 shadow-xl">
           <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
           <span class="text-sm text-gray-300">Ready to connect</span>
         </div>
       </div>
        </div>
      </div>

             <!-- Connection Status -->
      
    </div>


         <script>
       // Function to show remote video and hide placeholder
       function showRemoteVideo() {
         const remoteVideo = document.getElementById('remoteVideo');
         const remotePlaceholder = document.getElementById('remoteVideoPlaceholder');
         
         if (remoteVideo && remotePlaceholder) {
           remoteVideo.classList.remove('hidden');
           remotePlaceholder.classList.add('hidden');
         }
       }
       
       // Function to show local video and hide placeholder
       function showLocalVideo() {
         const localVideo = document.getElementById('localVideo');
         const localPlaceholder = document.getElementById('localVideoPlaceholder');
         
         if (localVideo && localPlaceholder) {
           localVideo.classList.remove('hidden');
           localPlaceholder.classList.add('hidden');
         }
       }
       
       // Function to hide remote video and show placeholder
       function hideRemoteVideo() {
         const remoteVideo = document.getElementById('remoteVideo');
         const remotePlaceholder = document.getElementById('remoteVideoPlaceholder');
         
         if (remoteVideo && remotePlaceholder) {
           remoteVideo.classList.add('hidden');
           remotePlaceholder.classList.remove('hidden');
         }
       }
       
       // Function to hide local video and show placeholder
       function hideLocalVideo() {
         const localVideo = document.getElementById('localVideo');
         const localPlaceholder = document.getElementById('localVideoPlaceholder');
         
         if (localVideo && localPlaceholder) {
           localVideo.classList.add('hidden');
           localPlaceholder.classList.remove('hidden');
         }
       }
       
       // Initialize camera and show local video when page loads
       async function initializeCamera() {
         try {
           const stream = await navigator.mediaDevices.getUserMedia({ 
             video: true, 
             audio: true 
           });
           
           const localVideo = document.getElementById('localVideo');
           if (localVideo) {
             localVideo.srcObject = stream;
             // Show local video after a short delay to ensure stream is ready
             setTimeout(showLocalVideo, 1000);
           }
           
           console.log('Camera initialized successfully');
         } catch (error) {
           console.error('Error accessing camera:', error);
         }
       }
       
       // Initialize camera when page loads
       document.addEventListener('DOMContentLoaded', initializeCamera);
     </script>
     <script src="js/app.js"></script>
   </body>
 </html>
